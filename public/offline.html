<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Woodflex - Offline</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #fafaf9;
      color: #1c1917;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      background-color: #1c1917;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #fafaf9;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 800;
    }
    p {
      font-size: 16px;
      max-width: 300px;
      color: #57534e;
      line-height: 1.5;
    }
    .btn {
      margin-top: 30px;
      background-color: #1c1917;
      color: #fafaf9;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 14px 0 rgba(28, 25, 23, 0.39);
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/-2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 2 20 20"/><path d="M8.53 8.53A4 4 0 0 0 11 14"/><path d="M12 12A4 4 0 0 0 8 8"/><path d="M14 14a4 4 0 0 0 2-2 4 4 0 0 0-4-4"/><path d="M16 16a4 4 0 0 0 2-2 4 4 0 0 0-4-4"/></svg>
  </div>
  <h1>You are offline</h1>
  <p>Woodflex requires an internet connection to sync your pricing data properly.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
